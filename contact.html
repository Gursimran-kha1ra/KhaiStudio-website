<!DOCTYPE html>
<html lang="en-US">
	

<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Contact | Preepix Photography Vancouver</title>
		<!-- Google Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com/">
		<link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;0,600;0,700;1,400;1,700&amp;family=Open+Sans:ital,wght@0,400;0,600;0,700;1,400;1,700&amp;display=swap" rel="stylesheet"> 
		<!-- Bootstrap CSS -->
		<link rel='stylesheet' id='bootstrap-css'  href='css/bootstrap/css/bootstrap.css' type='text/css' media='all' />
		<!-- Font Awesome Icons CSS -->
		<link rel='stylesheet' id='font-awesome'  href='css/fontawesome/css/all.css' type='text/css' media='all' />
		<!-- Owl Carousel -->
		<link rel='stylesheet' id='owl-carousel'  href='js/owl-carousel/owl.carousel.css' type='text/css' media='all' />
		<!-- Main CSS File -->
		<link rel='stylesheet' id='gleam-style-css'  href='style.css' type='text/css' media='all' />
		<!-- favicons -->
		<link rel="icon" href="images/icons/favicon-32x32.png" sizes="32x32" />
		<link rel="icon" href="images/icons/favicon-192x192.png" sizes="192x192" />
		<link rel="apple-touch-icon-precomposed" href="images/icons/favicon-180x180.png" />
	</head>
	<body>
		<div id="header"></div>
		<!-- /HEADER -->
		<!-- PAGE TOP -->
		<div class="top-single-bkg " style="background-image:url('images/top-headers/top-contact.jpg');">
			<div class="inner-desc">
				<div class="container">
					<h1 class="post-title single-post-title">Get in Touch</h1>
					<span class="post-subtitle page-subtitle">
Let’s capture your story — reach out to plan your shoot.
</span>
				</div>
			</div>
		</div>
		<!-- /PAGE TOP -->
		<!-- PAGE CONTENT -->
		<div class="page-holder custom-page-template page-full fullscreen-page clearfix">
			<!-- SECTION 1-->
			<section class="section-holder">
				<div class="container">
					<div class="row">
						<div class="col-lg-6 margin-bm54">
							<div id="contact-form-holder">
								<form method="post" id="contact-form" action='#'>
									<div class="row margin-b24">
										<div class="col-md-4 margin-bm24"><input type="text" name="name" class="comm-field" placeholder="Name" required/></div>
										<div class="col-md-4 margin-bm24"><input type="email" name="email" class="comm-field" placeholder="Email" required /> </div>
										<div class="col-md-4"><input type="text" name="subject" class="comm-field" placeholder="Subject" /> </div>
									</div>
									<p><textarea name="message" id="msg-contact" rows="5" placeholder="Message" required></textarea></p>
									<p class="antispam">Leave this empty: <input type="text" name="url" /></p>
									<p><input type="submit" value="Send message" id="submit"/></p>
								</form>
							</div>
							<!-- contact-form-holder-->
							<div id="output-contact"></div>
						</div>
						<!-- /col-lg-6 -->	
						<div class="col-lg-6">
							<div class="margin-l54">
								<h2 class="section-title margin-b32">Get in touch</h2>				

					<div class="row">
					<div class="col-md-6">
						<div class="icon-box-3-wrapper">
							<div class="icon-box-3-icon">
							<div class="icon-box-3-inner">
							<i class="fas fa-phone-alt"></i>
							</div>
							</div>
							<div class="icon-box-3-content">
								<h3 class="box-title box-title-3">Call Us Today </h3>
								<p>Contact via Instagram</p>
							</div>
						</div>
					</div>
					<!-- /col-md-6 -->
					<div class="col-md-6">
						<div class="icon-box-3-wrapper">
							<div class="icon-box-3-icon">
							<div class="icon-box-3-inner">
							<i class="far fa-envelope"></i>
							</div>
							</div>
							<div class="icon-box-3-content">
								<h3 class="box-title box-title-3">Send Message </h3>
<p>
<a href="https://www.instagram.com/preepix/" target="_blank" rel="noopener me">
Message on Instagram
</a>
</p>
							</div>
						</div>
					</div>
					<!-- /col-md-6 -->

				</div>	
				<!-- /row -->	
				
				<div class="row margin-b32min">
					<div class="col-md-6">
						<div class="icon-box-3-wrapper">
							<div class="icon-box-3-icon">
							<div class="icon-box-3-inner">
							<i class="fas fa-map-marker-alt"></i>
							</div>
							</div>
							<div class="icon-box-3-content">
								<h3 class="box-title box-title-3">Address </h3>
								<p>Metro Vancouver, Canada</p>
								<p>Available for bookings via Instagram or email</p>
							</div>
						</div>
					</div>
					<!-- /col-md-6 -->
					<div class="col-md-6">
						<div class="icon-box-3-wrapper">
							<div class="icon-box-3-icon">
							<div class="icon-box-3-inner">
							<i class="far fa-clock"></i>
							</div>
							</div>
							<div class="icon-box-3-content">
								<h3 class="box-title box-title-3">Work Hours</h3>
								<p>Mon-Fri: 9AM - 5PM</p>
							</div>
						</div>
					</div>
					<!-- /col-md-6 -->

				</div>	
				<!-- /row -->
							</div>
							<!-- /margin-l54 -->	
							
						</div>
						<!-- /col-lg-6 -->	
					</div>
					<!-- /row -->
				</div>
				<!-- /container -->
			</section>
			<!-- /SECTION 1-->
			<!-- SECTION 2-->
			<section>
				<div class="gmaps">
					<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d83327.37148313464!2d-123.20630488144621!3d49.2578181906132!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x548673f143a94fb3%3A0xbb9196ea9b81f38b!2sVancouver%2C%20BC!5e0!3m2!1sen!2sca!4v1777717821191!5m2!1sen!2sca" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
				</div>
			</section>
			<!-- /SECTION 2-->
		</div>
		<!-- page-content -->
		<!-- /PAGE CONTENT -->
		
		<!-- FOOTER -->
		<div id="footer"></div>
		<!-- JS --> 
		<script src='js/jquery.js'></script>
		<script src='js/jquery-migrate.min.js'></script>
		<script src='css/bootstrap/js/popper.js'></script>
		<script src='css/bootstrap/js/bootstrap.js'></script>
		<script src='js/easing.js'></script>
		<script src='js/fitvids.js'></script>
		<script src='js/owl-carousel/owl.carousel.js'></script>
		<script src='js/isotope.js'></script>
		<script src='js/simple-lightbox.js'></script>
		<!-- MAIN JS -->
		<script>
		document.addEventListener("DOMContentLoaded", function () {
			fetch("partials/header.html")
				.then(res => res.text())
				.then(data => {
					document.getElementById("header").innerHTML = data;

					// re-run theme JS AFTER header loads
					const script = document.createElement("script");
					script.src = "js/init.js";
					document.body.appendChild(script);
				});
		});
	</script>
	<script>
		document.addEventListener("DOMContentLoaded", function () {
			fetch("partials/footer.html")
				.then(res => res.text())
				.then(data => {
					document.getElementById("footer").innerHTML = data;

					
				});
		});
	</script>
		<!-- CONTAT FORM JS -->
		<script src='js/jquery.form.min.js'></script>
		<script src='js/contactform.js'></script>
	
</body>


</html>
